# DevFlow Editor Profile — Generic (CLI / Headless)
# Fallback profile for environments without a GUI editor.
# Source of truth for install.sh — parsed at install time via grep/awk.
#
# FORMAT RULES (required for bash parsing):
#   - No inline comments after values
#   - One key: value per line, indented with 2 spaces under section header
#   - REMOVE as value = install.sh will strip that tool/path from installed files
#
# Profiles are discovered from editor-profiles/*.yaml at install time.
# The generic profile is always available as the fallback option.
#
# When adding support for a new editor (e.g., Cursor, JetBrains, Windsurf):
# 1. Copy this file → editor-profiles/{editor-id}.yaml
# 2. Fill in id, display_name, paths, tool_mappings, and post_install
# 3. Zero skill/prompt files need to be modified — SOLID Open/Closed
#
# SHARED DIRECTORY: install.sh automatically copies .agents/skills/shared/ to
# skills_dir/shared/ for every editor profile. Skills reference shared rules via
# relative paths (../shared/rules.md) which resolve correctly regardless of the
# install target directory defined in paths.skills.

id: generic
display_name: "Generic (CLI / Headless)"

# ── Installation paths ────────────────────────────────────────────────────────
paths:
  base: "$HOME/.devflow"
  skills: "$HOME/.devflow/skills"
  prompts: "$HOME/.devflow/prompts"
  instructions: "$HOME/.devflow/instructions"
  agents: "$HOME/.devflow/agents"

# ── Tool name mappings ────────────────────────────────────────────────────────
# Maps FROM (tool name in skill/prompt source files) TO (equivalent for this editor).
# REMOVE = that tool reference will be stripped from the installed file.
# install.sh reads these pairs and applies sed substitutions at install time.
tool_mappings:
  vscode_askQuestions: REMOVE
  semantic_search: grep_search
  grep_search: grep_search
  file_search: file_search
  read_file: read_file
  create_file: create_file
  replace_string_in_file: replace_string_in_file
  run_in_terminal: run_in_terminal
  memory: memory
  list_dir: list_dir
# ── Path mappings ────────────────────────────────────────────────────────────
# REMOVE = those lines will be stripped from installed files.
path_mappings:
  /memories: REMOVE
# ── Install behavior ──────────────────────────────────────────────────────────
install:
  tool_substitution: true

# ── Post-install message ─────────────────────────────────────────────────────
post_install:
  reload_message: "Restart your AI editor/tool to pick up the new agent files"
  usage_command: "@devflow <feature request>"
